<body>

<!-- Start Content Page -->
<div class="container-fluid bg-light py-5">
    <div class="col-md-6 m-auto text-center">
        <h1 class="h1">Contacto</h1>
        <p>
            Proident, sunt in culpa qui officia deserunt mollit anim id est laborum.
            Lorem ipsum dolor sit amet.
        </p>
    </div>
</div>

<!-- Start Map -->
<div class="container py-5">
    <h2 class="text-center">Nuestra Ubicación</h2>
    <div class="text-center">
        <!-- Contenedor para el mapa de Google -->
        <!--<div id="mapid" style="width: 100%; height: 300px;"></div>-->
        <img src="https://i.imgur.com/kzBJPeO.png" alt="Mapa de ubicación" style="max-width: 100%; height: auto;">
    </div>
</div>


<!-- End Map -->

<!-- Start Contact -->
<div class="container py-5">
    <div class="row py-5">
        <form class="col-md-9 m-auto" method="post" action="/contact" role="form">
            <div class="row">
                <div class="form-group col-md-6 mb-3">
                    <label for="name">Nombre</label>
                    <input type="text" class="form-control mt-1" id="name" name="name" placeholder="Nombre" required>
                </div>
                <div class="form-group col-md-6 mb-3">
                    <label for="email">Email</label>
                    <input type="email" class="form-control mt-1" id="email" name="email" placeholder="Email" required>
                </div>
            </div>
            <div class="mb-3">
                <label for="subject">Asunto</label>
                <input type="text" class="form-control mt-1" id="subject" name="subject" placeholder="Asunto" required>
            </div>
            <div class="mb-3">
                <label for="message">Mensaje</label>
                <textarea class="form-control mt-1" id="message" name="message" placeholder="Message" rows="8" required></textarea>
            </div>
            <div class="row">
                <div class="col text-end mt-2">
                    <button type="submit" class="btn btn-success btn-lg px-3">Hablemos</button>
                </div>
            </div>
        </form>
    </div>
</div>
<!-- End Contact -->

<div th:insert="~{fragments/footer :: footer}"></div>

</body>
</html>
