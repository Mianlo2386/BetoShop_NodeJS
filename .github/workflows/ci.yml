name: CI - BetoStore Backend

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# --- NIVEL WORKFLOW (Recomendado) ---
# Al ponerlo aquí, afecta a todos los jobs y todos los pasos automáticamente.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    # --- NIVEL JOB (Alternativa) ---
    # Si prefieres que solo afecte a este job específico, ponlo aquí (fuera de steps).
    # env:
    #   FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js v25.8.1
        uses: actions/setup-node@v4
        with:
          node-version: '25.8.1'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install Dependencies
        run: npm ci
        working-directory: ./backend

      - name: Run Vitest Suite (40 Tests)
        run: npm test
        working-directory: ./backend