<!DOCTYPE html>
<html lang="es">

<head>
    <title>Admin - betostore</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" href="https://i.imgur.com/039muYH.jpeg">
    <link rel="stylesheet" href="/assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="/assets/css/templatemo.css">
    <link rel="stylesheet" href="/assets/css/custom.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white">
    <div class="container">
        <a class="navbar-brand text-success logo h2" href="/">betostore</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="/shop.html">Tienda</a></li>
                <li class="nav-item"><a class="nav-link" href="/contact.html">Contacto</a></li>
            </ul>
            <div class="ms-3">
                <span class="text-success"><i class="fas fa-user-shield"></i> Admin</span>
                <button class="btn btn-sm btn-outline-danger ms-2" onclick="logout()">Salir</button>
            </div>
        </div>
    </div>
</nav>

<!-- Dashboard -->
<section class="py-5">
    <div class="container">
        <div class="row">
            <div class="col-12">
                <h2 class="h2 text-success mb-4"><i class="fas fa-cogs"></i> Panel de Administración</h2>
            </div>
        </div>
        
        <div class="row g-4">
            <!-- Productos -->
            <div class="col-md-6">
                <div class="card h-100 shadow-sm">
                    <div class="card-body text-center">
                        <i class="fas fa-box fa-3x text-success mb-3"></i>
                        <h4>Productos</h4>
                        <p class="text-muted">Gestiona el catálogo de productos</p>
                        <a href="/admin/productos.html" class="btn btn-success">Administrar Productos</a>
                    </div>
                </div>
            </div>
            
            <!-- Usuarios -->
            <div class="col-md-6">
                <div class="card h-100 shadow-sm">
                    <div class="card-body text-center">
                        <i class="fas fa-users fa-3x text-success mb-3"></i>
                        <h4>Usuarios</h4>
                        <p class="text-muted">Gestiona usuarios del sistema</p>
                        <a href="/admin/usuarios.html" class="btn btn-success">Administrar Usuarios</a>
                    </div>
                </div>
            </div>
            
            <!-- Contactos -->
            <div class="col-md-6">
                <div class="card h-100 shadow-sm">
                    <div class="card-body text-center">
                        <i class="fas fa-envelope fa-3x text-success mb-3"></i>
                        <h4>Contactos</h4>
                        <p class="text-muted">Ver mensajes recibidos</p>
                        <a href="/admin/contactos.html" class="btn btn-success">Ver Mensajes</a>
                    </div>
                </div>
            </div>
            
            <!-- Estadísticas -->
            <div class="col-md-6">
                <div class="card h-100 shadow-sm">
                    <div class="card-body text-center">
                        <i class="fas fa-chart-bar fa-3x text-success mb-3"></i>
                        <h4>Estadísticas</h4>
                        <p class="text-muted">Resumen del sistema</p>
                        <button class="btn btn-outline-success" onclick="loadStats()">Ver Stats</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script src="/assets/js/jquery-1.11.0.min.js"></script>
<script src="/assets/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/api.js"></script>
<script>
function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('username');
    localStorage.removeItem('userId');
    localStorage.removeItem('roles');
    window.location.href = '/';
}

async function loadStats() {
    try {
        const response = await api.get('/api/dashboard');
        if (!response.success) throw new Error();
        const s = response.data;
        Swal.fire({
            title: '<i class="fas fa-chart-bar text-success"></i> Estadísticas',
            html: `
                <div class="text-start">
                    <h6 class="text-success"><i class="fas fa-box"></i> Productos</h6>
                    <ul class="list-unstyled ms-3 mb-3">
                        <li>Total activos: <strong>${s.productos.total}</strong></li>
                        <li>Categorías: <strong>${s.productos.categorias}</strong></li>
                        <li>Stock bajo (≤5): <strong>${s.productos.stockBajo}</strong></li>
                        <li>Precio promedio: <strong>$${s.productos.precioPromedio.toLocaleString('es-AR')}</strong></li>
                    </ul>
                    <h6 class="text-success"><i class="fas fa-envelope"></i> Contactos</h6>
                    <ul class="list-unstyled ms-3 mb-3">
                        <li>Total: <strong>${s.contactos.total}</strong></li>
                        <li>No leídos: <strong>${s.contactos.noLeidos}</strong></li>
                        <li>Últimos 7 días: <strong>${s.contactos.ultimosSieteDias}</strong></li>
                    </ul>
                    <h6 class="text-success"><i class="fas fa-tag"></i> Promociones</h6>
                    <ul class="list-unstyled ms-3 mb-3">
                        <li>Activas hoy: <strong>${s.promociones.activasHoy}</strong></li>
                        <li>Vencen en 7 días: <strong>${s.promociones.vencenPronto}</strong></li>
                    </ul>
                    <h6 class="text-success"><i class="fas fa-users"></i> Usuarios</h6>
                    <ul class="list-unstyled ms-3">
                        <li>Total activos: <strong>${s.usuarios.total}</strong></li>
                        <li>Nuevos (30 días): <strong>${s.usuarios.nuevosUltimos30Dias}</strong></li>
                    </ul>
                </div>
            `,
            confirmButtonText: 'Cerrar',
            confirmButtonColor: '#28a745',
            width: '500px',
        });
    } catch (e) {
        Swal.fire('Error', 'No se pudieron cargar las estadísticas', 'error');
    }
}

document.addEventListener('DOMContentLoaded', function() {
    const token = localStorage.getItem('token');
    const rolesStr = localStorage.getItem('roles');
    
    if (!token || !rolesStr) {
        window.location.href = '/login.html?redirect=/admin/dashboard.html';
        return;
    }
    
    let roles;
    try {
        roles = JSON.parse(rolesStr);
    } catch (e) {
        roles = rolesStr;
    }
    
    const isAdmin = Array.isArray(roles) ? roles.includes('ROLE_ADMIN') : roles.includes('ROLE_ADMIN');
    
    if (!isAdmin) {
        window.location.href = '/login.html?redirect=/admin/dashboard.html';
    }
});
</script>

</body>
</html>
