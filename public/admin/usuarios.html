<!DOCTYPE html>
<html lang="es">

<head>
    <title>Admin Usuarios - betostore</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" href="https://i.imgur.com/039muYH.jpeg">
    <link rel="stylesheet" href="/assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="/assets/css/templatemo.css">
    <link rel="stylesheet" href="/assets/css/custom.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-light bg-white">
    <div class="container">
        <a class="navbar-brand text-success logo h2" href="/">betostore</a>
        <div class="ms-auto">
            <a href="/admin/dashboard.html" class="btn btn-outline-success btn-sm">Volver</a>
        </div>
    </div>
</nav>

<section class="py-5">
    <div class="container">
        <h2 class="h2 text-success mb-4"><i class="fas fa-users"></i> Usuarios</h2>
        <div class="card shadow">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-success">
                            <tr>
                                <th>Username</th>
                                <th>Email</th>
                                <th>Roles</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="usuarios-table"><tr><td colspan="5">Cargando...</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</section>

<script src="/assets/js/jquery-1.11.0.min.js"></script>
<script src="/assets/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/api.js"></script>
<script>
let usuarios = [];

document.addEventListener('DOMContentLoaded', function() {
    if (!localStorage.getItem('token') || !localStorage.getItem('roles')?.includes('ROLE_ADMIN')) {
        window.location.href = '/login.html?redirect=/admin/dashboard.html';
        return;
    }
    loadUsuarios();
});

async function loadUsuarios() {
    try {
        const response = await api.get('/api/usuarios');
        usuarios = response.data || [];
        renderTable();
    } catch (e) { console.error(e); }
}

function renderTable() {
    const tbody = document.getElementById('usuarios-table');
    if (!usuarios.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center">Sin usuarios</td></tr>';
        return;
    }
    tbody.innerHTML = usuarios.map(u => `
        <tr>
            <td>${u.username}</td>
            <td>${u.email}</td>
            <td>${(u.roles || []).join(', ')}</td>
            <td>${u.isLocked ? '<span class="badge bg-danger">Bloqueado</span>' : '<span class="badge bg-success">Activo</span>'}</td>
            <td>
                <button class="btn btn-sm btn-outline-primary" onclick="toggleLock('${u._id}', ${!u.isLocked})">
                    <i class="fas fa-${u.isLocked ? 'unlock' : 'lock'}"></i>
                </button>
            </td>
        </tr>
    `).join('');
}

async function toggleLock(id, lock) {
    try {
        await api.post(`/api/usuarios/${id}/${lock ? 'lock' : 'unlock'}`, {});
        Swal.fire('OK', lock ? 'Usuario bloqueado' : 'Usuario desbloqueado', 'success');
        loadUsuarios();
    } catch (e) {
        Swal.fire('Error', 'No se pudo realizar la acción', 'error');
    }
}
</script>
</body>
</html>
